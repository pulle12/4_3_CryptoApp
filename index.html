<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>CryptoApp</title>

    <link rel="stylesheet" href="assets/styles.css"/>

    <!-- Vue 3 -->
    <script src="js/vue.global.js"></script>

    <!-- Axios -->
    <script src="js/axios.min.js"></script>
</head>

<body>

<div id="app">
    <div class="nav-bar">
        <h2>CryptoApp</h2>
    </div>

    <!-- Kauf Formular -->
    <purchase-form @add-to-wallet="addPurchase"></purchase-form>

    <!-- Käufe anzeigen -->
    <app-display
            :purchases="purchases"
            :prices="prices">
    </app-display>

    <!-- Wallets -->
    <wallet-list :wallets="wallets"></wallet-list>
</div>

<!-- Komponenten -->
<script src="components/AppDisplay.js"></script>
<script src="components/PurchaseForm.js"></script>
<script src="components/WalletList.js"></script>

<!-- Main -->
<script src="main.js"></script>

</body>
</html>
