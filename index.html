<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CryptoApp</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="assets/styles.css"/>

    <script src="js/vue.global.js"></script>
    <script src="js/axios.min.js"></script>
</head>

<body>


<div id="app">
    <div class="nav-bar">
        <h3>CryptoApp</h3>
    </div>

    <div class="app-frame">
        <div class="wallet-container">
            <purchase-form
                    :currency-options="currencyOptions"
                    :selected-currency="selectedCurrency"
                    :amount="amount"
                    :current-value="currentValue"
                    @update:selected-currency="selectedCurrency = $event"
                    @update:amount="amount = $event"
                    @buy="buyCurrency"
            ></purchase-form>

            <wallet-list
                    :wallets="wallets"
                    :total-value="totalWalletValue"
                    :total-percent="totalWalletPercent"
            ></wallet-list>
        </div>
    </div>
</div>

<script src="components/AppDisplay.js"></script>
<script src="components/PurchaseForm.js"></script>
<script src="components/WalletList.js"></script>
<script src="js/main.js"></script>

</body>
</html>
